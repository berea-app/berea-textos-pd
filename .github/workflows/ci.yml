name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check pipeline tests

      - name: Run unit tests
        run: pytest -q

  reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build twice and diff SHA-256
        env:
          BEREA_FAKE_NOW: "2026-04-28T00:00:00-03:00"
        run: |
          python -m pipeline.cli build --bible rv1909
          sha1=$(sha256sum output/rv1909.bb | awk '{print $1}')
          rm -f output/rv1909.bb
          python -m pipeline.cli build --bible rv1909
          sha2=$(sha256sum output/rv1909.bb | awk '{print $1}')
          echo "first  build SHA: $sha1"
          echo "second build SHA: $sha2"
          test "$sha1" = "$sha2"
